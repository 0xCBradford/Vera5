name: Extension quality

on:
  pull_request:
  workflow_dispatch:
    inputs:
      skip_browser_e2e:
        description: Skip browser E2E smokes (quota-sensitive manual runs)
        required: false
        type: boolean
        default: false

defaults:
  run:
    working-directory: extension

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (production)
        run: npm run audit:prod

      - name: Dependency audit (devDependency report)
        run: npm audit
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  browser-e2e-smokes:
    if: github.event_name == 'pull_request' || github.event.inputs.skip_browser_e2e != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Critical browser E2E smokes (PR gate)
        run: npm run test:e2e:critical

  firefox-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Chromium extension
        run: npm run build

      - name: Build Firefox extension artifact
        run: npm run build:firefox

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: vera5-firefox-extension
          path: extension/dist-firefox/
          if-no-files-found: error
